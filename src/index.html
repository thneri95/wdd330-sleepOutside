<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <div class="hero">
        <img
          src="./images/banner-sm.jpg"
          alt="Outdoor landscape"
          class="hero__image"
        />
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
        <div class="logo logo--square">
          <img
            src="./images/noun_Tent_2517.svg"
            alt="SleepOutside badge logo"
          />
          <div>SleepOutside</div>
        </div>
      </div>

      <section class="products-section">
        <h2>Top Products</h2>
        <ul class="products"></ul>
      </section>
    </main>

    <footer id="main-footer"></footer>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
