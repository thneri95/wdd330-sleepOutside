<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Home</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <div class="hero">
      <img src="./images/banner-sm.jpg" alt="Outdoor landscape" class="hero__image" />
      <div class="mission">
        <p>
          Our mission is to provide you with everything you need to sleep
          outside comfortably at an affordable price.
        </p>
      </div>
      <div class="logo logo--square">
        <img src="./images/noun_Tent_2517.svg" alt="SleepOutside badge logo" />
        <div>SleepOutside</div>
      </div>
    </div>

    <section class="categories-section">
      <h2>Shop by Category</h2>
      <ul class="product-categories">
        <li>
          <a href="/product_listing/index.html?category=tents">
            <img src="/images/category-tents.svg" alt="Shop tents" />
            <span>Tents</span>
          </a>
        </li>
        <li>
          <a href="/product_listing/index.html?category=backpacks">
            <img src="/images/category-backpacks.svg" alt="Shop backpacks" />
            <span>Backpacks</span>
          </a>
        </li>
        <li>
          <a href="/product_listing/index.html?category=sleeping-bags">
            <img src="/images/category-sleepingbags.svg" alt="Shop sleeping bags" />
            <span>Sleeping Bags</span>
          </a>
        </li>
        <li>
          <a href="/product_listing/index.html?category=hammocks">
            <img src="/images/category-hammocks.svg" alt="Shop hammocks" />
            <span>Hammocks</span>
          </a>
        </li>
      </ul>
    </section>
  </main>

  <footer id="main-footer"></footer>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
<!-- End of file -->
